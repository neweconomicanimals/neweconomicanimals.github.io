name: fetch-assets
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and verify images
        run: |
          set -e
          mkdir -p assets
          [ -f assets/cover.jpg ] || curl -sL "https://i.scdn.co/image/ab6765630000ba8a0bd52fdba0d7225b96916365" -o assets/cover.jpg
          [ -f assets/cover-1000.jpg ] || curl -sL "https://is1-ssl.mzstatic.com/image/thumb/Podcasts112/v4/a6/61/d5/a661d519-6218-6803-8eae-b3f48fd2db4f/mza_15358922788738748173.jpg/1000x1000bb.jpg" -o assets/cover-1000.jpg
          [ -f assets/listen-on-amazon-music-jp-charcoal.png ] || curl -sL "https://amazonmusic.app.box.com/index.php?rm=box_download_shared_file&shared_name=j5lmtjd7tqvm3zj1rg2mcp4t1k4esxww&file_id=f_1204013215718" -o assets/listen-on-amazon-music-jp-charcoal.png
          [ -f assets/listen-on-amazon-music-jp-white.png ] || curl -sL "https://amazonmusic.app.box.com/index.php?rm=box_download_shared_file&shared_name=j5lmtjd7tqvm3zj1rg2mcp4t1k4esxww&file_id=f_1203983796144" -o assets/listen-on-amazon-music-jp-white.png
          [ -f assets/spotify-logo-green.png ] || curl -sL "https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Full_Logo_RGB_Green.png" -o assets/spotify-logo-green.png
          [ -f assets/apple-podcasts-lockup-white-jp.svg ] || curl -sL "https://tools.applemediaservices.com/api/badges/listen-on-apple-podcasts/standard-white/ja-jp?size=250x83" -o assets/apple-podcasts-lockup-white-jp.svg
          echo "5352e40637cab50d24e5c911f895468296cc5af865723adb9f0eebc9eb64a5fd  assets/cover.jpg" | sha256sum -c
          identify -format "%wx%h %m" assets/cover-1000.jpg | grep -q "^1000x1000 JPEG"
          [ "$(stat -c%s assets/cover-1000.jpg)" -gt 200000 ]
          echo "4704a6ebc518cf7a26a8948b2092d078077ac790f88ed68a3c48fc6fbe0fdf63  assets/listen-on-amazon-music-jp-charcoal.png" | sha256sum -c
          echo "d16b993e511316fe930a3579ba51a229459c801962ad4a310c7b216a5f7443a8  assets/listen-on-amazon-music-jp-white.png" | sha256sum -c
          echo "691d3c7145702c0533b651efa6c29af57235e2ba7a2f7d54f57e650086d8915c  assets/spotify-logo-green.png" | sha256sum -c
          echo "6271f72cd93b4f70fdac75066bead1debcf750ba8be757beb446f276f5643ca3  assets/apple-podcasts-lockup-white-jp.svg" | sha256sum -c
      - name: Commit assets
        run: |
          if git status --porcelain assets | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets
            git commit -m "Add 1000x1000 cover art for promo submissions"
            git push
          fi
